name: Diagnose TWRP-14 Build Issue
on:
  workflow_dispatch:

env:
  DEVICE_PATH: device/lenovo/tb375fc
  TWRP_MANIFEST: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  TWRP_BRANCH: twrp-14

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses6 libncurses-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig lz4 libssl-dev python3 python3-pip lld-18

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -sSL 'https://storage.googleapis.com/git-repo-downloads/repo' > ~/bin/repo
          chmod +x ~/bin/repo
          echo ~/bin >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "Muffin_Joe"
          git config --global user.email "builder@github.com"
          git config --global http.postBuffer 524288000

      - name: Init & Sync TWRP source
        run: |
          mkdir -p ~/twrp
          cd ~/twrp
          repo init -u $TWRP_MANIFEST -b $TWRP_BRANCH --depth=1
          repo sync --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune -j4 2>&1

      - name: Copy device tree
        run: |
          mkdir -p ~/twrp/$DEVICE_PATH
          cp -r $GITHUB_WORKSPACE/device_tree/* ~/twrp/$DEVICE_PATH/
          rm -rf ~/twrp/$DEVICE_PATH/.github 2>/dev/null || true

      - name: Step 1 - Check device tree files
        run: |
          echo "=== Device tree files ==="
          ls -la ~/twrp/$DEVICE_PATH/
          echo ""
          echo "=== twrp_tb375fc.mk ==="
          cat ~/twrp/$DEVICE_PATH/twrp_tb375fc.mk

      - name: Step 2 - Check vendor structure
        run: |
          cd ~/twrp
          echo "=== vendor/twrp ==="
          ls -la vendor/twrp/ 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== vendor/twrp/config/ ==="
          ls -la vendor/twrp/config/ 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== Check common.mk files ==="
          for f in vendor/twrp/config/common.mk vendor/omni/config/common.mk; do
            if [ -f "$f" ]; then echo "EXISTS: $f"; head -3 "$f"; else echo "MISSING: $f"; fi
          done
          echo ""
          echo "=== All vendor dirs ==="
          ls vendor/ 2>/dev/null

      - name: Step 3 - Check build system
        run: |
          cd ~/twrp
          source build/envsetup.sh 2>&1 || echo "envsetup failed"
          echo ""
          echo "=== lunch menu ==="
          lunch 2>&1 || true
          echo ""
          echo "=== Try lunch ==="
          lunch twrp_tb375fc-eng 2>&1 || true

      - name: Step 4 - Try omni fallback
        if: always()
        run: |
          cd ~/twrp
          if [ -f vendor/omni/config/common.mk ] && [ ! -f vendor/twrp/config/common.mk ]; then
            echo "FIX: Switching to vendor/omni"
            sed -i 's|vendor/twrp/config/common.mk|vendor/omni/config/common.mk|' $DEVICE_PATH/twrp_tb375fc.mk
            source build/envsetup.sh 2>&1
            lunch twrp_tb375fc-eng 2>&1 || true
          fi
