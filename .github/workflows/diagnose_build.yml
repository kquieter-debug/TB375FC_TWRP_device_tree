name: Diagnose TWRP-14 Build Issue (v2)
on:
  workflow_dispatch:

env:
  DEVICE_PATH: device/lenovo/tb375fc
  TWRP_MANIFEST: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  TWRP_BRANCH: twrp-14

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-core gnupg flex bison build-essential zip curl zlib1g-dev lld-18

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -sSL 'https://storage.googleapis.com/git-repo-downloads/repo' > ~/bin/repo
          chmod +x ~/bin/repo
          echo ~/bin >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "Muffin_Joe"
          git config --global user.email "builder@github.com"
          git config --global http.postBuffer 524288000

      - name: Init TWRP source
        run: |
          mkdir -p ~/twrp
          cd ~/twrp
          repo init -u $TWRP_MANIFEST -b $TWRP_BRANCH --depth=1

      - name: Show manifest remotes
        run: |
          cd ~/twrp
          echo "=== Manifest XML (remotes section) ==="
          grep -A1 '<remote' .repo/manifest.xml | head -40
          echo ""
          echo "=== All project paths ==="
          grep '<project' .repo/manifest.xml | head -30

      - name: Add missing build/release repo
        run: |
          cd ~/twrp
          REMOTE=$(grep -oP '(?<=<remote.*name=")[^"]+' .repo/manifest.xml | head -1)
          AOSP_REMOTE=$(grep -oP '(?<=fetch=")[^"]*android[^"]*' .repo/manifest.xml | head -1)
          echo "Primary remote name: $REMOTE"
          echo "AOSP fetch URL hint: $AOSP_REMOTE"
          mkdir -p .repo/local_manifests
          # Try to use the correct remote format
          cat > .repo/local_manifests/build_release.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
          </manifest>
          EOF
          echo "=== local_manifests ==="
          ls -la .repo/local_manifests/

      - name: Sync TWRP source
        run: |
          cd ~/twrp
          repo sync --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune -j4 2>&1

      - name: Copy device tree
        run: |
          mkdir -p ~/twrp/$DEVICE_PATH
          cp -r $GITHUB_WORKSPACE/device_tree/* ~/twrp/$DEVICE_PATH/
          rm -rf ~/twrp/$DEVICE_PATH/.github 2>/dev/null || true

      - name: Try lunch
        run: |
          cd ~/twrp
          source build/envsetup.sh 2>&1 || true
          echo ""
          echo "=== lunch twrp_tb375fc-eng ==="
          lunch twrp_tb375fc-eng 2>&1 || true
