name: Diagnose TWRP-14 Build Issue (v3)
on:
  workflow_dispatch:

env:
  DEVICE_PATH: device/lenovo/tb375fc
  TWRP_MANIFEST: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  TWRP_BRANCH: twrp-14

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-core gnupg flex bison build-essential zip curl zlib1g-dev lld-18

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -sSL 'https://storage.googleapis.com/git-repo-downloads/repo' > ~/bin/repo
          chmod +x ~/bin/repo
          echo ~/bin >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "Muffin_Joe"
          git config --global user.email "builder@github.com"
          git config --global http.postBuffer 524288000

      - name: Init TWRP source
        run: |
          mkdir -p ~/twrp
          cd ~/twrp
          repo init -u $TWRP_MANIFEST -b $TWRP_BRANCH --depth=1

      - name: Show full manifest content
        run: |
          cd ~/twrp
          echo "=== .repo/manifest.xml ==="
          cat .repo/manifest.xml
          echo ""
          echo "=== .repo/manifests/ ==="
          ls -la .repo/manifests/ 2>/dev/null
          echo ""
          echo "=== default.xml ==="
          cat .repo/manifests/default.xml 2>/dev/null

      - name: Sync TWRP source
        run: |
          cd ~/twrp
          repo sync --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune -j4 2>&1

      - name: Copy device tree
        run: |
          mkdir -p ~/twrp/$DEVICE_PATH
          cp -r $GITHUB_WORKSPACE/device_tree/* ~/twrp/$DEVICE_PATH/
          rm -rf ~/twrp/$DEVICE_PATH/.github 2>/dev/null || true

      - name: Try direct fix - add build/release
        run: |
          cd ~/twrp
          # Check the default manifest for remote info
          echo "=== Remote info ==="
          grep -r 'remote' .repo/manifests/ .repo/manifest.xml 2>/dev/null | head -20
          echo ""
          echo "=== Fetch URL info ==="
          grep -r 'fetch' .repo/manifests/ .repo/manifest.xml 2>/dev/null | head -20
          echo ""
          # Try to find the AOSP remote
          AOSP_FETCH=$(grep -ro 'fetch="[^"]*android[^"]*"' .repo/manifests/ .repo/manifest.xml 2>/dev/null | head -1)
          AOSP_NAME=$(grep -B1 "$AOSP_FETCH" .repo/manifests/default.xml 2>/dev/null | grep 'name=' | grep -oP 'name="\K[^"]+')
          echo "AOSP fetch: $AOSP_FETCH"
          echo "AOSP remote name: $AOSP_NAME"
          echo ""
          echo "=== First remote in default.xml ==="
          grep '<remote' .repo/manifests/default.xml 2>/dev/null
