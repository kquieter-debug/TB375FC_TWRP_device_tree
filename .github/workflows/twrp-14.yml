name: Build TWRP14
on:
  workflow_dispatch:

env:
  DEVICE_PATH: device/lenovo/tb375fc
  TWRP_MANIFEST: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  TWRP_BRANCH: twrp-14

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses6 libncurses-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig lz4 libssl-dev python3 python3-pip lld-18

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -sSL 'https://storage.googleapis.com/git-repo-downloads/repo' > ~/bin/repo
          chmod +x ~/bin/repo
          echo ~/bin >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "Muffin_Joe"
          git config --global user.email "builder@github.com"
          git config --global http.postBuffer 524288000
          git config --global pack.windowMemory "512m"

      - name: Init TWRP source
        run: |
          mkdir -p ~/twrp
          cd ~/twrp
          repo init -u $TWRP_MANIFEST -b $TWRP_BRANCH --depth=1

      - name: Add missing build/release repo
        run: |
          cd ~/twrp
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/build_release.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remote name="aosp_remote" fetch="https://android.googlesource.com" />
            <project path="build/release" name="platform/build/release" remote="aosp_remote" revision="refs/tags/android-14.0.0_r67" clone-depth="1" />
          </manifest>
          EOF

      - name: Sync TWRP source
        run: |
          cd ~/twrp
          repo sync --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune -j4 2>&1

      - name: Copy device tree
        run: |
          mkdir -p ~/twrp/$DEVICE_PATH
          cp -r $GITHUB_WORKSPACE/device_tree/* ~/twrp/$DEVICE_PATH/
          rm -rf ~/twrp/$DEVICE_PATH/.github 2>/dev/null || true

      - name: Check available releases
        run: |
          cd ~/twrp
          echo "=== build/release dirs ==="
          ls -d build/release/*/ 2>/dev/null | head -20
          echo ""
          echo "=== Available releases ==="
          ls build/release/ 2>/dev/null

      - name: Build TWRP
        run: |
          cd ~/twrp
          source build/envsetup.sh
          # Try 3-part lunch format with ap3a first
          echo "=== Trying lunch twrp_tb375fc-ap3a-eng ==="
          lunch twrp_tb375fc-ap3a-eng 2>&1 && echo "SUCCESS" || echo "FAILED"
          if [ $? -ne 0 ]; then
            echo "=== Trying lunch twrp_tb375fc-ap1a-eng ==="
            lunch twrp_tb375fc-ap1a-eng 2>&1
          fi
          mka vendorbootimage -j2 2>&1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twrp-tb375fc-14
          path: |
            ~/twrp/out/target/product/tb375fc/vendor_boot.img
            ~/twrp/out/target/product/tb375fc/recovery.img
          if-no-files-found: warn
